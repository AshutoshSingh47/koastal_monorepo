version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: store_postgres
    environment:
      POSTGRES_USER: ashutoshsingh
      POSTGRES_PASSWORD: Ashu@12345
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

volumes:
  postgres_data:
